<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Film</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

.slider{
display:flex;
width:100%;
height:100vh;
overflow-x:scroll;
scroll-snap-type:x mandatory;
}

.slide{
min-width:100%;
height:100vh;
scroll-snap-align:start;
position:relative;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.caption{
position:absolute;
bottom:40px;
left:20px;
right:20px;
color:white;
font-size:20px;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="slider">

<div class="slide">
<img src="foto1.jpg">
<div class="caption">Kenangan pertama kita ❤️</div>
</div>

<div class="slide">
<img src="foto2.jpg">
<div class="caption">Momen yang tak terlupakan</div>
</div>

<div class="slide">
<img src="foto3.jpg">
<div class="caption">Semoga selalu bersama</div>
</div>

<div class="slide">
<img src="foto4.jpg">
<div class="caption">Memory forever 🎞️</div>
</div>

</div>

<audio autoplay loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

</body>
</html>
