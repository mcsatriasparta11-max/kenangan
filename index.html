<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Film</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
}

/* background foto blur */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.jpg") center/cover no-repeat;
filter:blur(2px) brightness(0.4);
z-index:-1;
}

/* halaman awal */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.start h1{
font-size:32px;
margin-bottom:25px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:18px 35px;
font-size:20px;
border-radius:30px;
cursor:pointer;
}

/* halaman galeri */

.gallery-page{
display:none;
padding:25px;
}

/* susunan foto vertikal */

.film-strip{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

/* frame foto */

.frame{
background:black;
padding:10px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.7);
}

.frame img{
width:90%;
max-width:420px;
border-radius:8px;
cursor:pointer;
}

/* fullscreen foto */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:32px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HALAMAN AWAL -->

<div class="start" id="start">

<h1>Memory Film 🎞️</h1>

<button onclick="openMemory()">Buka Kenangan ❤️</button>

</div>


<!-- HALAMAN FOTO -->

<div class="gallery-page" id="gallery">

<h2>Our Memory</h2>

<div class="film-strip">

<div class="frame">
<img src="foto1.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto2.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto3.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto4.jpg" onclick="openImage(this.src)">
</div>

</div>

</div>


<!-- FULLSCREEN FOTO -->

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImage()">×</span>

<img id="lightbox-img">

</div>


<!-- MUSIK -->

<audio id="music" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>


<script>

function openMemory(){

document.getElementById("start").style.display="none";
document.getElementById("gallery").style.display="block";

var music=document.getElementById("music");
music.play();

}

function openImage(src){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
