<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Polaroid</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:black;
}

/* background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.jpg") center/cover no-repeat;
filter:blur(5px) brightness(0.4);
z-index:-1;
}

/* halaman awal */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.start h1{
font-size:36px;
margin-bottom:25px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:16px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
}

/* panah kembali */

.back{
position:fixed;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
display:none;
}

/* kamera */

#camera{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
z-index:999;
}

/* flash */

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flashAnim 0.6s;
}

@keyframes flashAnim{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* galeri */

.gallery{
display:none;
padding:40px 20px;
}

.film-strip{
display:flex;
flex-direction:column;
align-items:center;
gap:50px;
}

/* FRAME POLAROID */

.frame{

background:white;

padding:12px 12px 50px 12px;

border-radius:4px;

box-shadow:0 12px 30px rgba(0,0,0,0.6);

transform:rotate(-2deg) translateY(40px);

opacity:0;

transition:all 0.8s;

}

.frame:nth-child(even){
transform:rotate(2deg) translateY(40px);
}

.frame.show{
opacity:1;
transform:rotate(0deg) translateY(0);
}

.frame img{
width:260px;
height:260px;
object-fit:cover;
display:block;
cursor:pointer;
}

/* fullscreen */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:32px;
cursor:pointer;
}

/* halaman pesan */

.message{
display:none;
height:100vh;
padding:40px;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:20px;
line-height:1.7;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="back" onclick="backGallery()">←</div>

<!-- HALAMAN AWAL -->

<div class="start" id="start">

<h1>Memory Polaroid 📸</h1>

<button onclick="openMemory()">Buka Kenangan ❤️</button>

</div>

<!-- ANIMASI KAMERA -->

<div id="camera">

📷

<div class="flash"></div>

</div>

<!-- GALERI FOTO -->

<div class="gallery" id="gallery">

<h2>Our Memories</h2>

<div class="film-strip">

<div class="frame"><img src="foto1.jpg" onclick="openImage(this.src)"></div>
<div class="frame"><img src="foto2.jpg" onclick="openImage(this.src)"></div>
<div class="frame"><img src="foto3.jpg" onclick="openImage(this.src)"></div>
<div class="frame"><img src="foto4.jpg" onclick="openImage(this.src)"></div>
<div class="frame"><img src="foto5.jpg" onclick="openImage(this.src)"></div>
<div class="frame"><img src="foto6.jpg" onclick="openImage(this.src)"></div>

</div>

<br>

<button onclick="openMessage()">Pesan Kenangan ❤️</button>

</div>

<!-- HALAMAN PESAN -->

<div class="message" id="message">

<h2>Pesan Kenangan ❤️</h2>

<p>

Terima kasih sudah membuka kenangan ini.<br><br>

Setiap foto adalah cerita kecil yang tidak akan pernah hilang.<br><br>

Semoga setiap kali melihatnya, kamu selalu tersenyum.

</p>

</div>

<!-- FULLSCREEN FOTO -->

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImage()">×</span>

<img id="lightbox-img">

</div>

<!-- AUDIO -->

<audio id="music" loop>
<source src="lagu.mp3">
</audio>

<audio id="shutter">
<source src="kamera.mp3">
</audio>

<script>

/* buka kenangan */

function openMemory(){

document.getElementById("start").style.display="none";

let cam=document.getElementById("camera");
let flash=document.querySelector(".flash");

cam.style.display="block";

document.getElementById("shutter").play();

setTimeout(()=>{
flash.classList.add("active");
},300);

setTimeout(()=>{

cam.style.display="none";

document.getElementById("gallery").style.display="block";

document.getElementById("music").play();

startScroll();

},1000);

}

/* fullscreen */

function openImage(src){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

/* buka pesan */

function openMessage(){

document.getElementById("gallery").style.display="none";
document.getElementById("message").style.display="flex";
document.querySelector(".back").style.display="block";

}

/* kembali */

function backGallery(){

document.getElementById("message").style.display="none";
document.getElementById("gallery").style.display="block";
document.querySelector(".back").style.display="none";

}

/* animasi scroll */

function startScroll(){

let frames=document.querySelectorAll(".frame");

function reveal(){

let windowHeight=window.innerHeight;

frames.forEach(frame=>{

let top=frame.getBoundingClientRect().top;

if(top < windowHeight-100){
frame.classList.add("show");
}

});

}

window.addEventListener("scroll",reveal);

reveal();

}

</script>

</body>
</html>
