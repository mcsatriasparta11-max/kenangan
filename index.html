<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Film</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
}

/* background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.jpg") center/cover no-repeat;
filter:blur(4px) brightness(0.5);
z-index:-1;
}

/* halaman awal */

.start{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.start h1{
font-size:34px;
margin-bottom:25px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:18px 35px;
font-size:20px;
border-radius:30px;
cursor:pointer;
}

/* kamera */

#camera{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
z-index:999;
}

/* flash */

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flashAnim 0.6s;
}

@keyframes flashAnim{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* galeri */

.gallery{
display:none;
padding:30px;
}

.film-strip{
display:flex;
flex-direction:column;
align-items:center;
gap:40px;
}

/* frame foto */

.frame{
background:black;
padding:10px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.7);

opacity:0;
transform:translateY(40px);
transition:all 0.8s;
}

.frame.show{
opacity:1;
transform:translateY(0);
}

.frame img{
width:90%;
max-width:420px;
border-radius:6px;
cursor:pointer;
}

/* fullscreen */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

/* halaman pesan */

.message{
display:none;
height:100vh;
padding:40px;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:20px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HALAMAN AWAL -->

<div class="start" id="start">

<h1>Memory Film 🎞️</h1>

<button onclick="openMemory()">Buka Kenangan ❤️</button>

</div>


<!-- KAMERA -->

<div id="camera">

📷

<div class="flash"></div>

</div>


<!-- GALERI FOTO -->

<div class="gallery" id="gallery">

<h2>Our Memory</h2>

<div class="film-strip">

<div class="frame">
<img src="foto1.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto2.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto3.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto4.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto5.jpg" onclick="openImage(this.src)">
</div>

<div class="frame">
<img src="foto6.jpg" onclick="openImage(this.src)">
</div>

</div>

<br>

<button onclick="openMessage()">Pesan Kenangan ❤️</button>

</div>


<!-- PESAN AKHIR -->

<div class="message" id="message">

<h2>Pesan Kenangan ❤️</h2>

<p>

Terima kasih sudah membuka kenangan ini.<br><br>

Setiap foto adalah cerita kecil yang tidak akan pernah hilang.<br><br>

Semoga setiap kali melihatnya, kamu selalu tersenyum.

</p>

</div>


<!-- FULLSCREEN FOTO -->

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImage()">×</span>

<img id="lightbox-img">

</div>


<!-- AUDIO -->

<audio id="music" loop>
<source src="lagu.mp3">
</audio>

<audio id="shutter">
<source src="kamera.mp3">
</audio>


<script>

/* buka kenangan */

function openMemory(){

document.getElementById("start").style.display="none";

let cam=document.getElementById("camera");
let flash=document.querySelector(".flash");

cam.style.display="block";

document.getElementById("shutter").play();

setTimeout(()=>{
flash.classList.add("active");
},300);

setTimeout(()=>{

cam.style.display="none";
document.getElementById("gallery").style.display="block";

document.getElementById("music").play();

startScroll();

},1000);

}

/* fullscreen foto */

function openImage(src){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

/* buka pesan */

function openMessage(){

document.getElementById("gallery").style.display="none";
document.getElementById("message").style.display="flex";

}

/* animasi scroll */

function startScroll(){

let frames=document.querySelectorAll(".frame");

function reveal(){

let windowHeight=window.innerHeight;

frames.forEach(frame=>{

let top=frame.getBoundingClientRect().top;

if(top < windowHeight-100){
frame.classList.add("show");
}

});

}

window.addEventListener("scroll",reveal);

reveal();

}

</script>

</body>
</html>
