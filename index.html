<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Gallery 2 Kolom Responsive</title>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background:black;
  overflow-x:hidden;
  overflow-y:auto;
}

/* ===== BACKGROUND BLUR + OVERLAY ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("background.jpg") center/cover no-repeat;
  filter:blur(8px) brightness(0.4);
  z-index:-1;
}
.bg::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6));
}

/* ===== HALAMAN ===== */
.start, .gallery, .message{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:1;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.hidden{
  opacity:0;
  transform:translateY(30px);
  pointer-events:none;
}

.start h1{
  font-size:36px;
  margin-bottom:25px;
  font-family: 'Pacifico', cursive;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

button{
  background:#ff4d6d;
  color:white;
  border:none;
  padding:16px 30px;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
  background:#ff6680;
}

/* ===== GALLERY 2 KOLM GRID ===== */
.gallery{
  padding:40px 20px;
  display:none;
}

.film-strip{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:30px;
  justify-items:center;
  padding-bottom:50px;
}

/* ===== FOTO ===== */
.frame{
  position:relative;
  width:280px;
  opacity:0;
  transform:translateY(40px) scale(0.95);
  transition:all 0.8s;
}

.frame.show{
  opacity:1;
  transform:translateY(0) scale(1) rotate(var(--rotate));
}

.frame img{
  width:100%;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:transform 0.5s;
}

/* ===== FRAME DECOR ===== */
.frame::after{
  content:"";
  position:absolute;
  bottom:-60px;
  left:-20px;
  width:150px;
  height:150px;
  background:url("frame.png") center/contain no-repeat;
  opacity:0.6;
}

/* ===== LIGHTBOX FULLSCREEN ===== */
.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:25px;
  font-size:32px;
  cursor:pointer;
}

/* ===== TOMBOL KEMBALI ===== */
.back{
  position:fixed;
  top:15px;
  left:15px;
  font-size:24px;
  background:rgba(0,0,0,0.5);
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  display:none;
  transition:0.3s;
}
.back:hover{
  background:rgba(255,255,255,0.2);
  color:#ff4d6d;
}

/* ===== PESAN ===== */
.message{
  display:none;
  min-height:100vh;
  padding:40px;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:20px;
  line-height:1.7;
}

/* ===== RESPONSIVE MOBILE ===== */
@media screen and (max-width:600px){
  .film-strip{
    grid-template-columns:1fr;
    gap:20px;
  }
  .frame{
    width:90%;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- TOMBOL KEMBALI -->
<div class="back" onclick="backToGallery()">←</div>

<!-- HALAMAN AWAL -->
<div class="start" id="start">
  <h1>Memory Gallery ❤️</h1>
  <button onclick="openMemory()">Buka Kenangan</button>
</div>

<!-- GALERI -->
<div class="gallery" id="gallery">
  <h2>Our Memories</h2>
  <div class="film-strip">
    <div class="frame"><img src="foto1.jpg" onclick="openImage(this.src)"></div>
    <div class="frame"><img src="foto2.jpg" onclick="openImage(this.src)"></div>
    <div class="frame"><img src="foto3.jpg" onclick="openImage(this.src)"></div>
    <div class="frame"><img src="foto4.jpg" onclick="openImage(this.src)"></div>
    <div class="frame"><img src="foto5.jpg" onclick="openImage(this.src)"></div>
    <div class="frame"><img src="foto6.jpg" onclick="openImage(this.src)"></div>
  </div>
  <br><br>
  <button onclick="openMessage()">Pesan Kenangan ❤️</button>
</div>

<!-- HALAMAN PESAN -->
<div class="message" id="message">
  <h2>Pesan Kenangan ❤️</h2>
  <p>
    Terima kasih sudah membuka kenangan ini.<br><br>
    Setiap foto menyimpan cerita yang tidak akan pernah hilang.<br><br>
    Semoga setiap kali melihatnya kamu selalu tersenyum.
  </p>
</div>

<!-- FULLSCREEN FOTO -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeImage()">×</span>
  <img id="lightbox-img">
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>

// ===== OPEN MEMORY =====
function openMemory(){
  document.getElementById("start").classList.add("hidden");

  setTimeout(()=> {
    document.getElementById("start").style.display="none";
    let gallery = document.getElementById("gallery");
    gallery.style.display = "flex";
    gallery.classList.remove("hidden");

    startScroll();
  }, 600);

  let music = document.getElementById("music");
  fadeInAudio(music, 2000); // mulai musik
}

// ===== FULLSCREEN FOTO =====
function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage(){
  document.getElementById("lightbox").style.display="none";
}

// tutup lightbox klik area hitam
document.getElementById("lightbox").addEventListener("click", function(e){
  if(e.target !== document.getElementById("lightbox-img")){
    closeImage();
  }
});

// ===== BUKA PESAN =====
function openMessage(){
  document.getElementById("gallery").style.display="none";
  document.getElementById("message").style.display="flex";
  document.querySelector(".back").style.display="block";
  // musik tetap jalan
}

// ===== BACK KE GALLERY =====
function backToGallery(){
  document.getElementById("message").style.display="none";
  document.getElementById("gallery").style.display="flex";
  document.querySelector(".back").style.display="none";
}

// ===== SCROLL ANIMASI FRAME =====
function startScroll(){
  let frames = document.querySelectorAll(".frame");

  frames.forEach(frame => {
    let rotateDeg = (Math.random() * 6 - 3) + "deg"; // -3 ~ 3 deg
    frame.style.setProperty("--rotate", rotateDeg);
  });

  function reveal(){
    let windowHeight = window.innerHeight;
    frames.forEach((frame, index)=>{
      let top = frame.getBoundingClientRect().top;
      if(top < windowHeight - 100){
        if(!frame.classList.contains("show")){
          setTimeout(()=>{
            frame.classList.add("show");
          }, index * 150);
        }
      }
    });
  }

  window.addEventListener("scroll", reveal);
  reveal();
}

// ===== AUDIO FADE IN =====
function fadeInAudio(audio, duration=2000){
  audio.volume = 0;
  audio.play();
  let step = 0.05;
  let interval = duration * step / 1000;
  let vol = 0;
  let fade = setInterval(()=>{
    vol += step;
    if(vol>=1){vol=1; clearInterval(fade);}
    audio.volume = vol;
  }, interval);
}

</script>

</body>
</html>
