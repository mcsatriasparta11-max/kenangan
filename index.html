<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Film</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
padding:40px 20px;
}

h1{
margin-bottom:10px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:15px 25px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.gallery{
display:none;
margin-top:30px;
}

.gallery img{
width:90%;
max-width:400px;
margin:15px auto;
display:block;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">

<h1>Open Your Memory 🎞️</h1>

<button onclick="startMemory()">Buka Kenangan ❤️</button>

<div class="gallery" id="galeri">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</div>

<audio id="music" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function startMemory(){

document.getElementById("galeri").style.display="block";

var music = document.getElementById("music");
music.play();

}

</script>

</body>
</html>
